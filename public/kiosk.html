<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/brand/kfc-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KFC — Kiosk tự đặt món</title>
  <link rel="stylesheet" href="/shared.css" />
  <link rel="stylesheet" href="/kiosk.css" />
</head>
<body class="kiosk-body">
  <div id="kiosk">

    <!-- ATTRACT — food-first hero, like the real idle screens -->
    <section id="screen-attract" class="screen active">
      <div class="attract-hero" aria-hidden="true"></div>
      <div class="attract-scrim" aria-hidden="true"></div>
      <div class="attract-inner">
        <img class="attract-logo" src="/brand/kfc-logo-white.png" alt="Kentucky Fried Chicken" />
        <h1 class="attract-title u-display">Gà Rán<br />Giòn Tan<br />Chuẩn Vị</h1>
        <p class="attract-sub" data-i18n="attract_sub">Đặt món ngay tại đây</p>
        <div class="attract-ticker" id="attract-ticker" aria-hidden="true"></div>
        <button class="attract-cta" id="btn-start">
          <span data-i18n="tap_to_start">Chạm để bắt đầu</span>
        </button>
      </div>
    </section>

    <!-- ORDER TYPE -->
    <section id="screen-ordertype" class="screen">
      <div class="ordertype-inner">
        <h2 class="u-display" data-i18n="where_eat">Bạn dùng bữa ở đâu?</h2>
        <div class="ordertype-cards">
          <button class="ordertype-card" data-type="dine-in">
            <span class="ot-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="32" cy="32" r="16" />
                <circle cx="32" cy="32" r="7" />
                <path d="M8 11v9M13 11v9M18 11v9M8 20a5 5 0 0 0 10 0M13 25v28" />
                <path d="M53 11c-4 7-4 15 0 21M53 32v21" />
              </svg>
            </span>
            <span class="ot-label" data-i18n="dine_in">Ăn tại đây</span>
          </button>
          <button class="ordertype-card" data-type="takeaway">
            <span class="ot-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 24h34l-4.2 30H19.2z" />
                <path d="M24 24v-5a8 8 0 0 1 16 0v5" />
                <path d="M23 33c3 4 15 4 18 0" />
              </svg>
            </span>
            <span class="ot-label" data-i18n="takeaway">Mang đi</span>
          </button>
        </div>
      </div>
    </section>

    <!-- MENU (browse) -->
    <section id="screen-menu" class="screen">
      <div class="context-strip" id="daypart-banner"></div>
      <div class="shop-layout">
        <nav class="side-rail" id="side-rail"></nav>
        <div class="shop-content">
          <h2 class="section-title" id="menu-title">MENU</h2>
          <div class="menu-grid-wrap"><div class="menu-grid" id="menu-grid"></div></div>
        </div>
      </div>
      <div class="bottom-bar" id="menu-bottom-bar"></div>
    </section>

    <!-- MEAL WIZARD (size / customize / addon / review) -->
    <section id="screen-wizard" class="screen">
      <div class="shop-layout">
        <nav class="side-rail steps" id="wizard-rail"></nav>
        <div class="shop-content" id="wizard-content"></div>
      </div>
      <div class="wizard-bottom">
        <button class="btn-back" id="wz-back" data-i18n="back">QUAY LẠI</button>
        <button class="btn-continue" id="wz-continue" data-i18n="continue">TIẾP TỤC</button>
      </div>
    </section>

    <!-- ADDED interstitial -->
    <section id="screen-added" class="screen">
      <div class="added-inner">
        <div class="added-check">✓</div>
        <h2 class="u-display" data-i18n="added_title">Đã thêm vào giỏ!</h2>
        <p data-i18n="added_sub">Tổng đơn của bạn đã được cập nhật.</p>
        <div class="added-total" id="added-total"></div>
        <button class="btn-continue wide" id="btn-continue-ordering" data-i18n="continue_ordering">TIẾP TỤC CHỌN MÓN</button>
        <button class="btn-textlink" id="btn-complete-order" data-i18n="complete_order">HOÀN TẤT ĐƠN HÀNG</button>
      </div>
    </section>

    <!-- BASKET / REVIEW ORDER -->
    <section id="screen-cart" class="screen">
      <div class="cart-inner">
        <h2 class="section-title" data-i18n="your_order">ĐƠN CỦA BẠN</h2>
        <div class="cart-lines" id="cart-lines"></div>
        <div class="cart-recs" id="cart-recs"></div>
        <div class="cart-extras">
          <div class="extra-row">
            <input id="voucher-input" placeholder="Mã khuyến mãi / Voucher" autocomplete="off" />
            <button id="btn-voucher" class="chip-btn" data-i18n="apply">ÁP DỤNG</button>
          </div>
          <div id="voucher-msg" class="extra-msg"></div>
          <div class="extra-row">
            <input id="loyalty-input" placeholder="SĐT thành viên / Member phone" inputmode="numeric" autocomplete="off" />
            <button id="btn-loyalty" class="chip-btn" data-i18n="check">KIỂM TRA</button>
          </div>
          <div id="loyalty-msg" class="extra-msg"></div>
        </div>
        <div class="cart-summary" id="cart-summary"></div>
        <div class="cart-actions">
          <button class="btn-back" id="btn-back-menu" data-i18n="add_more">+ THÊM MÓN</button>
          <button class="btn-continue" id="btn-checkout" data-i18n="checkout">THANH TOÁN</button>
        </div>
      </div>
    </section>

    <!-- PAYMENT -->
    <section id="screen-payment" class="screen">
      <div class="payment-inner">
        <h2 class="section-title" data-i18n="payment">THANH TOÁN</h2>
        <div class="pay-total" id="pay-total"></div>
        <div id="pay-lastchance"></div>
        <div class="pay-methods" id="pay-methods">
          <button class="pay-card" data-method="momo"><span class="pay-ic momo">M</span> MoMo</button>
          <button class="pay-card" data-method="zalopay"><span class="pay-ic zalo">Z</span> ZaloPay</button>
          <button class="pay-card" data-method="card"><span class="pay-ic card">💳</span> <span data-i18n="card">Thẻ</span></button>
          <button class="pay-card" data-method="cash"><span class="pay-ic cash">💵</span> <span data-i18n="cash">Tiền mặt tại quầy</span></button>
        </div>
        <div class="pay-qr hidden" id="pay-qr">
          <div class="qr-box" id="qr-box"></div>
          <p data-i18n="scan_qr">Quét mã để thanh toán</p>
          <div class="pay-spinner"></div>
        </div>
        <button class="btn-back" id="btn-back-cart" data-i18n="back">QUAY LẠI</button>
      </div>
    </section>

    <!-- CONFIRM -->
    <section id="screen-confirm" class="screen">
      <div class="confetti" id="confetti"></div>
      <div class="confirm-inner">
        <div class="added-check">✓</div>
        <h2 class="u-display" data-i18n="order_placed">Đặt món thành công!</h2>
        <p data-i18n="order_number_is">Số đơn của bạn</p>
        <div class="order-number" id="order-number">—</div>
        <div class="order-status-track" id="order-status-track"></div>
        <div class="confirm-summary" id="confirm-summary"></div>
        <div id="comeback-voucher"></div>
        <button class="btn-continue wide" id="btn-new-order" data-i18n="new_order">BẮT ĐẦU ĐƠN MỚI</button>
      </div>
    </section>

    <!-- persistent header -->
    <header class="kiosk-header" id="kiosk-header">
      <button class="kh-logo-btn" id="btn-home"><img src="/brand/kfc-logo.png" alt="KFC" /></button>
      <div class="kh-store" id="kh-store"></div>
      <button class="kh-lang" id="btn-lang">EN</button>
    </header>

    <div class="toast" id="toast"></div>
    <div class="fly-layer" id="fly-layer"></div>
  </div>

  <script src="/lib.js"></script>
  <script src="/kiosk.js"></script>
</body>
</html>
